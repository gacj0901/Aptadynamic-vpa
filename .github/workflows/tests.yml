name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - name: Check out grid repository
        uses: actions/checkout@v4
        with:
          path: grid
      - name: Check out certified PRAMA dependency
        uses: actions/checkout@v4
        with:
          repository: gacj0901/PRAMA-Protokol
          ref: v0.2.1
          path: PRAMA-Protokol
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: grid/constraints-g2.txt
      - name: Install pinned environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c grid/constraints-g2.txt ./PRAMA-Protokol/PRAMA-Protokol-py
          python -m pip install -c grid/constraints-g2.txt -e ./grid
          python -m pip install -c grid/constraints-g2.txt pytest
      - name: Run tests
        working-directory: grid
        run: pytest -q
